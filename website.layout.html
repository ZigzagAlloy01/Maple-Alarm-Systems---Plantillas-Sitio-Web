<data name="Main layout" inherit_id="portal.frontend_layout">
    
    <xpath expr="//html" position="before">
        <t t-set="html_data" t-value="{             'lang': lang.replace('_', '-'),             'data-website-id': website.id,             'data-edit_translations': '1' if edit_translations else None,             'data-main-object': repr(main_object) if main_object else None,             'data-seo-object': repr(seo_object) if seo_object else None,         }"/>
        <t t-if="not request.env.user._is_public()" t-set="nothing" t-value="html_data.update({             'data-is-published': 'website_published' in main_object._fields and main_object.sudo().website_published,             'data-can-optimize-seo': 'website_meta_description' in main_object._fields,             'data-can-publish': 'can_publish' in main_object._fields and main_object.sudo(False).can_publish,             'data-editable-in-backend': edit_in_backend or ('website_published' in main_object._fields and main_object._name != 'website.page'),         })"/>
        <t t-if="editable or translatable" t-set="nothing" t-value="html_data.update({             'data-editable': '1' if editable else None,             'data-translatable': '1' if translatable else None,             'data-view-xmlid': xmlid,             'data-viewid': viewid,             'data-default-lang-name': website.default_lang_id.name.split('/').pop() if translatable else None,             'data-lang-name': website.env['res.lang']._get_data(code=lang).name.split('/').pop() if translatable else None,         })"/>
    </xpath>

    <xpath expr="//head/*[1]" position="before">
        <t t-if="not title">
            <t t-if="not additional_title and main_object and 'name' in main_object">
                <t t-set="additional_title" t-value="main_object.sudo().name"/>
            </t>
            <t t-set="default_title" t-translation="off" t-value="(additional_title + ' | ' if additional_title else '') + website.name"/>
            <t t-set="seo_object" t-value="seo_object or main_object"/>
            <t t-if="seo_object and 'website_meta_title' in seo_object and seo_object.sudo().website_meta_title">
                <t t-set="title" t-value="seo_object.sudo().website_meta_title"/>
            </t>
            <t t-else="">
                <t t-set="title" t-value="default_title"/>
            </t>
        </t>
        <t t-set="x_icon" t-value="website.image_url(website, 'favicon')"/>
    </xpath>
    <xpath expr="//head/meta[last()]" position="after">
        <meta name="generator" content="Odoo"/>
        <t t-set="website_meta" t-value="seo_object and seo_object.sudo().get_website_meta() or {}"/>
        <meta name="default_title" t-att-content="default_title" groups="website.group_website_designer"/>
        <t t-set="no_index" t-value="             (main_object and 'website_indexed' in main_object and not main_object.sudo().website_indexed)             or (website.domain and not website._is_indexable_url(request.httprequest.url_root))             or (pager and isinstance(pager, dict) and pager.get('page', {}).get('num', 1) != 1)         "/>
        <meta t-if="no_index" name="robots" content="noindex"/>
        <t t-set="seo_object" t-value="seo_object or main_object"/>
        <t t-set="meta_description" t-value="seo_object and 'website_meta_description' in seo_object             and seo_object.sudo().website_meta_description or website_meta_description or website_meta.get('meta_description', '')"/>
        <t t-set="meta_keywords" t-value="seo_object and 'website_meta_keywords' in seo_object             and seo_object.sudo().website_meta_keywords or website_meta_keywords"/>
        <meta t-if="meta_description or editable" name="description" t-att-content="meta_description"/>
        <meta t-if="meta_keywords or editable" name="keywords" t-att-content="meta_keywords"/>
        <t t-if="seo_object">
        <meta name="default_description" t-att-content="website_meta_description or website_meta.get('meta_description')" groups="website.group_website_designer"/>
            <!-- OpenGraph tags for Facebook sharing -->
            <t t-set="opengraph_meta" t-value="website_meta.get('opengraph_meta')"/>
            <t t-if="opengraph_meta">
                <t t-foreach="opengraph_meta" t-as="property">
                    <t t-if="isinstance(opengraph_meta[property], list)">
                        <t t-foreach="opengraph_meta[property]" t-as="meta_content">
        <meta t-att-property="property" t-att-content="meta_content"/>
                        </t>
                    </t>
                    <t t-else="">
        <meta t-att-property="property" t-att-content="opengraph_meta[property]"/>
                    </t>
                </t>
            </t>
            <!-- Twitter tags for sharing -->
            <t t-set="twitter_meta" t-value="website_meta.get('twitter_meta')"/>
            <t t-if="opengraph_meta">
                <t t-foreach="twitter_meta" t-as="t_meta">
        <meta t-att-name="t_meta" t-att-content="twitter_meta[t_meta]"/>
                </t>
            </t>
        </t>
        <t t-set="canonical_domain" t-value="website.get_base_url()"/>
        <!-- no hreflang on non-canonical pages or if no alternate language -->
        <t t-if="request.is_frontend_multilang and website._is_canonical_url() and len(frontend_languages) &gt; 1">
            <t t-foreach="frontend_languages.values()" t-as="lg">
        <link rel="alternate" t-att-hreflang="lg.hreflang" t-att-href="url_localized(lang_code=lg.code, prefetch_langs=True, canonical_domain=canonical_domain)"/>
            </t>
        <link rel="alternate" hreflang="x-default" t-att-href="url_localized(lang_code=website.env['res.lang']._get_data(id=website._get_cached('default_lang_id')).code, canonical_domain=canonical_domain)"/>
        </t>
        <link rel="canonical" t-att-href="website._get_canonical_url()"/>
        <!-- TODO: Once we have style in DB, add this preconnect only if a
        google font is actually used. Note that if no font is used, the
        preconnect is actually not connecting to the google servers. -->
        <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin=""/>
    </xpath>

    <xpath expr="//head/script" position="before">
        <t t-if="website and website.cookies_bar and website.block_third_party_domains                  and not request.env['ir.http']._is_allowed_cookie('optional')                  and not editable and not translatable                  and not request.env.user.has_group('website.group_website_restricted_editor')">
            <script src="/website/static/src/js/content/cookie_watcher.js"/>
            <script>
                watch3rdPartyScripts(<t t-out="json.dumps(website._get_blocked_third_party_domains_list())"/>);
            </script>
        </t>
    </xpath>

    <xpath expr="//header" position="attributes">
        <attribute name="data-name">Header</attribute>
        <attribute name="t-att-data-extra-items-toggle-aria-label">extra_items_toggle_aria_label</attribute>
    </xpath>

    <xpath expr="//header" position="before">
        <t t-set="cta_btn_text" t-value="False"/>
        <t t-set="header_content_width" t-valuef="container"/>
        <t t-set="cta_btn_href">/contactus</t>
        <t t-set="extra_items_toggle_aria_label">BotÃ³n de elementos adicionales</t>
        <t t-set="primary_additional_colors" t-value="False"/>
        <t t-set="secondary_additional_colors" t-value="False"/>
        <t t-if="primary_additional_colors">
            <t t-set="_additional_btn_color" t-valuef="btn btn-outline-primary"/>
        </t>
        <t t-if="secondary_additional_colors">
            <t t-set="_additional_btn_color" t-valuef="btn btn-outline-secondary"/>
        </t>
    </xpath>

    <xpath expr="//footer" position="attributes">
        <attribute name="data-name">Footer</attribute>
        <!-- Background now controlled by css configuration, using color combinations -->
        <attribute name="t-attf-class" add="o_colored_level o_cc" remove="bg-light" separator=" "/>
    </xpath>
    <xpath expr="//div[hasclass('o_footer_copyright')]" position="attributes">
        <attribute name="data-name">Copyright</attribute>
        <!-- Background now controlled by css configuration, using color combinations -->
        <attribute name="class" add="o_colored_level o_cc" separator=" "/>
    </xpath>
    <xpath expr="//t[@t-call='web.brand_promotion']/.." position="attributes">
        <attribute name="class" add="o_not_editable small" separator=" "/>
        <attribute name="t-if">not editable</attribute>
    </xpath>
    <xpath expr="//div[hasclass('o_footer_copyright')]//div[hasclass('col-sm')][2]" position="attributes">
        <attribute name="class" remove="col-sm text-sm-end" add="col-md mt-auto mb-0 text-md-end" separator=" "/>
    </xpath>

    <xpath expr="//head" position="inside">
            <link rel="preconnect" href="https://fonts.googleapis.com"/>
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
            <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&amp;family=Noto+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
        
            
        <t t-if="website.google_analytics_key and not editable">

            <script id="tracking_code" t-attf-src="https://www.googletagmanager.com/gtag/js?id={{ website.google_analytics_key }}" async="async"/>
            <script id="tracking_code_config">
                window.dataLayer = window.dataLayer || [];
                function gtag(){dataLayer.push(arguments);}
                gtag('consent', 'default', {
                    'ad_storage': 'denied',
                    'ad_user_data': 'denied',
                    'ad_personalization': 'denied',
                    'analytics_storage': 'denied',
                });
                gtag('js', new Date());
                gtag('config', '<t t-out="website.google_analytics_key"/>');
                function allConsentsGranted() {
                    gtag('consent', 'update', {
                        'ad_storage': 'granted',
                        'ad_user_data': 'granted',
                        'ad_personalization': 'granted',
                        'analytics_storage': 'granted',
                    });
                }
                <t t-if="website._allConsentsGranted()">
                    allConsentsGranted();
                </t>
                <t t-else="">
                    document.addEventListener(
                        "optionalCookiesAccepted",
                        allConsentsGranted,
                        {once: true}
                    );
                </t>
            </script>
        </t>
        <t t-if="website.plausible_shared_key and not editable">
            <script id="plausible_script" name="plausible" defer="defer" t-att-data-domain="website.plausible_site" t-att-src="website._get_plausible_script_url()"/>
        </t>
    </xpath>

    <!-- Page options -->
    <xpath expr="//div[@id='wrapwrap']" position="before">
        <!-- Todo: Refactor this part. These inputs were initially used for multiple use cases but are now only used to determine if a given option is activated on the page. We should probably implement the feature using an RPC. -->
        <t groups="website.group_website_restricted_editor">
            <t t-foreach="['header_overlay', 'header_color', 'header_text_color', 'header_visible', 'footer_visible']" t-as="optionName">
                <!-- Firefox autocomplete is too aggressive and works on hidden inputs,
                so we need to disable it (https://bugzilla.mozilla.org/show_bug.cgi?id=520561) -->
                <input t-if="optionName in main_object" type="hidden" class="o_page_option_data" autocomplete="off" t-att-name="optionName" t-att-value="main_object.sudo()[optionName]"/>
            </t>
        </t>

        <t t-set="header_bg_color" t-value="'header_color' in main_object and main_object.sudo().header_color or ''"/>
        <t t-set="header_bg_color_is_class" t-value="'bg-' in header_bg_color"/>
        <t t-set="header_bg_color_class" t-value="header_bg_color_is_class and header_bg_color or ''"/>
        <t t-set="header_bg_color_style" t-value="(not header_bg_color_is_class) and header_bg_color or ''"/>

        <t t-set="header_text_color" t-value="'header_text_color' in main_object and main_object.sudo().header_text_color or ''"/>
        <t t-set="header_text_color_is_class" t-value="'text-' in header_text_color"/>
        <t t-set="header_text_color_class" t-value="header_text_color_is_class and header_text_color or ''"/>
        <t t-set="header_text_color_style" t-value="(not header_text_color_is_class) and header_text_color or ''"/>

        <div groups="base.group_user" class="o_frontend_to_backend_nav position-fixed d-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="o_frontend_to_backend_icon position-absolute" width="24px" height="24px" viewBox="-7 -7 24 24" preserveAspectRatio="xMinYMin">
                <path fill="#FFF" d="M8 8V1a1 1 0 1 1 2 0v8a1 1 0 0 1-1 1H1a1 1 0 1 1 0-2h7z"/>
            </svg>
            <div class="o_frontend_to_backend_buttons d-flex">
                <a href="#" title="Ir a sus aplicaciones de Odoo" class="o_frontend_to_backend_apps_btn fa fa-th d-flex align-items-center justify-content-center text-decoration-none" data-bs-toggle="dropdown"/>
                <div class="dropdown-menu o_frontend_to_backend_apps_menu" role="menu">
                    <a role="menuitem" class="dropdown-item" t-out="menu['name']" t-as="menu" t-foreach="env['ir.ui.menu'].with_context(force_action=True).load_menus_root()['children']" t-attf-href="/odoo/action-#{menu['action'] and menu['action'].split(',')[1] or ''}"/>
                </div>
                <a groups="website.group_website_restricted_editor" href="#" title="Editar este contenido" class="o_frontend_to_backend_edit_btn px-3 d-flex align-items-center justify-content-center text-decoration-none">
                    <img src="/website/static/description/icon.png" alt=""/>Editor
                </a>
            </div>
        </div>
    </xpath>
    <xpath expr="//div[@id='wrapwrap']" position="attributes">
        <attribute name="t-attf-class" add="#{'o_header_overlay' if 'header_overlay' in main_object and main_object.sudo().header_overlay else ''}" separator=" "/>
    </xpath>
    <xpath expr="//header" position="attributes">
        <attribute name="t-attf-class" add="#{header_bg_color_class}" separator=" "/>
        <attribute name="t-attf-style" add="#{header_bg_color_style and ('background-color: %s;' % header_bg_color_style)}" separator=" "/>
        <attribute name="t-attf-class" add="#{header_text_color_class}" separator=" "/>
        <attribute name="t-attf-style" add="#{header_text_color_style and ('color: %s;' % header_text_color_style)}" separator=" "/>
    </xpath>
    <xpath expr="//header" position="attributes">
        <attribute name="t-attf-class" add="#{'d-none o_snippet_invisible' if 'header_visible' in main_object and not main_object.sudo().header_visible else ''}" separator=" "/>
        <attribute name="t-att-data-invisible">'1' if 'header_visible' in main_object and not main_object.sudo().header_visible else None</attribute>
    </xpath>
    <xpath expr="//footer[@id='bottom']" position="attributes">
        <attribute name="t-attf-class" add="#{'d-none o_snippet_invisible' if 'footer_visible' in main_object and not main_object.sudo().footer_visible else ''}" separator=" "/>
        <attribute name="t-att-data-invisible">'1' if 'footer_visible' in main_object and not main_object.sudo().footer_visible else None</attribute>
    </xpath>

    <xpath expr="//head" position="inside">
        <style type="text/css">

              --maple-red-soft: #edebeb;
              --maple-red-dark: #790711;

              --maple-alternate-dark: #2a4170;
              --maple-orange: #FF8A00;
              --maple-orange-dark: #a35902;
              
              --maple-red-two: #C8102E;

              --overlay-white-06: rgba(255, 255, 255, 0.06);
              --overlay-white-05: rgba(255, 255, 255, 0.05);

              --overlay-white-03: rgba(255, 255, 255, 0.03);

          body,
          input,
          textarea,
          select,
          button,
          span,
          .btn,
          .dropdown-menu,
          .popover,
          .tooltip {
              font-family: var(--font-body) !important;
          }
          
          h1,
          h2,
          h3,
          h4,
          h5,
          h6,
          .navbar-brand,
          .card-title,
          .s_title h1 {
              font-family: var(--font-heading) !important;
          }
          
          #top_menu .nav-link[href="/"],
          .o_offcanvas_menu_wrap .nav-link[href="/"],
          .o_header_mobile .nav-link[href="/"] {
              display: inline-flex !important;
              align-items: center;
              justify-content: center;
              font-size: 0 !important;
          }
          
          #top_menu .nav-link[href="/"]::before,
          .o_offcanvas_menu_wrap .nav-link[href="/"]::before,
          .o_header_mobile .nav-link[href="/"]::before {
              content: "\f015" !important;
              visibility: visible !important;
              color: var(white) !important;
              font-family: "Font Awesome 5 Free", "Font Awesome 6 Free", "FontAwesome" !important;
              font-size: 1.25rem !important;
              font-weight: 900 !important;
              line-height: 1 !important;
          }
          
          #top_menu .nav-link[href="/"] span,
          .o_offcanvas_menu_wrap .nav-link[href="/"] span,
          .o_header_mobile .nav-link[href="/"] span {
              display: none !important;
          }
          
          .top_menu.o_mega_menu_is_offcanvas .nav-link {
              transition: all 0.2s ease-in-out !important;
          }
          
          .top_menu.o_mega_menu_is_offcanvas .nav-link:hover {
          background-color: var(--maple-purple-gray) !important;
              color: var(--maple-white) !important;
          }
          
          .top_menu.o_mega_menu_is_offcanvas .nav-link.active,
          .top_menu.o_mega_menu_is_offcanvas .nav-link:active {
          background-color: var(--maple-purple-gray-dark) !important;
              color: var(--maple-white) !important;
          }
          
          .o_cc1 .nav-pills .nav-link.active,
          #wrapwrap.o_header_overlay &gt; header:not(.o_header_affixed):not(.o_header_sidebar):not(.o_top_menu_collapse_shown) &gt; .navbar .nav-pills .nav-link.active,
          .navbar-light .nav-pills .nav-link.active,
          .o_cc1 .nav-pills .show &gt; .nav-link,
          #wrapwrap.o_header_overlay &gt; header:not(.o_header_affixed):not(.o_header_sidebar):not(.o_top_menu_collapse_shown) &gt; .navbar .nav-pills .show &gt; .nav-link,
          .navbar-light .nav-pills .show &gt; .nav-link,
          .o_colored_level .o_cc1 .nav-pills .nav-link.active,
          .o_colored_level .o_cc1 .nav-pills .show &gt; .nav-link,
          .nav-item.position-static.dropdown .dropdown-toggle.nav-link.o_mega_menu_toggle.show {
              background-color: var(--maple-purple-gray) !important;
              color: var(--maple-white) !important;
          }
          
          .o_wsale_filmstrip_item.active {
              border-color: var(--maple-purple-gray) !important;
              background-color: var(--maple-purple-gray) !important;
          }
          
          .o_wsale_filmstrip_item.active,
          .o_wsale_filmstrip_item.active span,
          .o_wsale_filmstrip_item.active a {
              color: var(--maple-white) !important;
          }
          
          :where(#o_wsale_container) .o_wsale_filmstrip_container .o_wsale_filmstrip_wrapper .o_wsale_filmstrip .o_wsale_filmstrip_link:is(:hover, :focus) .o_wsale_filmstrip_item:not(.active) {
              border-color: var(--navy-blue-dark) !important;

                    var finalTitle = makeEl("h5", "syscomify-mini-title", "CategorÃ­as finales");
                    var finalList = makeEl("ul", "syscomify-right-links");

                    finalLinks.forEach(function (link) {
                    var finalItem = document.createElement("li");
                    var finalLink = document.createElement("a");
                    finalLink.className = "syscomify-right-link";
                    finalLink.href = link.url;
                    finalLink.innerHTML = '&lt;span&gt;' + link.title + '&lt;/span&gt;&lt;small&gt;abrir&lt;/small&gt;';
                    finalItem.appendChild(finalLink);
                    finalList.appendChild(finalItem);
                    });

                    rightPane.appendChild(finalTitle);
                    rightPane.appendChild(finalList);
                }
                }

                function render() {
                syncResponsiveMode();
                var view = currentView();
                renderLeft(view);
                renderCenter(view);
                renderRight(view);
                renderMobile();
                }

                searchInput.addEventListener("input", function () {
                state.term = cleanText(searchInput.value);
                setActiveSection(0);
                state.mobilePath = [];
                render();
                });

                toggleBtn.addEventListener("click", function () {
                if (isMobileViewport()) {
                    syncResponsiveMode();
                    return;
                }
                var isApp = sectionEl.classList.contains("syscomify-mode-app");
                sectionEl.classList.toggle("syscomify-mode-app", !isApp);
                sectionEl.classList.toggle("syscomify-mode-classic", isApp);
                toggleBtn.textContent = isApp ? "Nuevo" : "ClÃ¡sico";
                });

                window.addEventListener("resize", function () {
                render();
                });

                window.addEventListener("orientationchange", function () {
                render();
                });

                sectionEl._syscomifyRender = render;
                var ownerMenu = sectionEl.closest(MENU_SELECTOR);
                if (ownerMenu) {
                ownerMenu._syscomifyRender = render;
                }

                setActiveSection(0);
                render();
                window.requestAnimationFrame(render);
                window.setTimeout(render, 150);
            }

            function enhanceMenus(root) {
                (root || document).querySelectorAll(MENU_SELECTOR).forEach(function (menu) {
                if (!isTargetMegaMenu(menu)) return;
                removeDuplicatedMenuSections(menu);
                if (menu.getAttribute(PROCESSED_ATTR) === "1") {
                    var existingSection = menu.querySelector(SECTION_SELECTOR);
                    removeDuplicatedInteractiveBlocks(existingSection);
                    var rerender = menu._syscomifyRender || (existingSection &amp;&amp; existingSection._syscomifyRender);
                    if (typeof rerender === "function") {
                    return;
                    }
                    resetClonedMenu(menu);
                }

                try {
                    menu.classList.add(MENU_ROOT_CLASS);

                    var scaffold = ensureMenuScaffold(menu);
                    if (!scaffold) return;

                    var parsedSections = parseSections(scaffold.sourceRow);
                    var sections = buildSectionsFromReference(parsedSections);
                    if (sections.length &lt; 2) return;

                    menu.setAttribute(PROCESSED_ATTR, "1");
                    buildInteractiveMenu(scaffold.sectionEl, sections, scaffold.sourceRow);
                } catch (error) {
                    console.error("[Syscomify Mega Menu]", error);
                }
                });
            }

            document.addEventListener("DOMContentLoaded", function () {
                enhanceMenus(document);
            });

            window.addEventListener("load", function () {
                enhanceMenus(document);
            });

            var pendingEnhance = null;
            var observer = new MutationObserver(function () {
                window.clearTimeout(pendingEnhance);
                pendingEnhance = window.setTimeout(function () {
                enhanceMenus(document);
                }, 120);
            });

            observer.observe(document.documentElement, {
                childList: true,
                subtree: true
            });

            function syscomifyRefreshAfterClick() {
                window.setTimeout(function () {
                enhanceMenus(document);
                }, 80);
            }

            document.addEventListener("click", syscomifyRefreshAfterClick, true);
            document.addEventListener("touchend", syscomifyRefreshAfterClick, true);
            })();
